<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="cabeçalho">
      <div class="logo">
        <img src="img/Left.png" alt="Logo do Youtube" />
      </div>
      <div class="pesquisar">
        <input type="text" name="pesquisar" id="pesquisar" />
        <button><img src="img/search.png" alt="" /></button>
      </div>

      <div class="login">
        <img src="img/video (6).png" alt="icon video" />
        <img src="img/bell.png" alt="icon do sininho" />
        <img src="img/Avatar.png" alt="imagem do perfil logado" />
      </div>
    </header>
   
<main class="container">
    
    <!-- Vídeo principal -->
    <section class="video-section">
        <div class="video-player">
            <iframe src="https://www.youtube.com/embed/rjyjcUOHLiA?si=Cfy3AhVwNnzoMipz" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>

        <h2>Semana Front-end | Dia 01: Construindo uma Landing Page</h2>

        <div class="video-info">
            

            <div class="video-info">
                <div class="channel">  
                    <div>
                     <img src="img/Channel Infos.png" alt="">
                </div> 
                    <button class="subscribe">INSCREVA-SE</button>
                </div>

                <div class="actions">
                   <img src="img/Like.png" alt="">
                   <img src="img/Deslike.png" alt="">
                   <img src="img/Share.png" alt="">
                   <img src="img/Download.png" alt="">
                </div>
            </div>

            

        </div>
        <div class="description">
                <p>28.418 visualizações • Transmitido ao vivo em 23 ago. de 2022</p>
                <p>
                    Inicie uma aventura imersiva no mundo do Front-end com HTML e CSS.
                    Explorando conceitos modernos e criação de interfaces.
                </p>
            </div>
    </section>

    <!-- Sidebar -->
    <sidebar class="sidebar">
        <div class="card">
            <div class="thumb">
             <img src="Video (5).png" alt="">
            </div>
            
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video (3).png" alt="">
            </div>
            
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video.jpg" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
              <img src="Video (4).png" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video (5).png" alt="">
            </div>
            
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video.jpg" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
              <img src="Video (4).png" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video (5).png" alt="">
            </div>
            
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video.jpg" alt="">
            </div>
        </div>

    </sidebar>

</main>

</body>
</html>
