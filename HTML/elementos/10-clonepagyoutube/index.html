<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <button>⋮</button>
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="YouTube Logo">
    </div>

    <input type="text" placeholder="Pesquisar">
   
    <div class="login">
      <button>🔍</button>
    <button>🎥</button>
    <button>👤</button>
    </div>
    
</header>
   
<main class="container">
    
    <!-- Vídeo principal -->
    <section class="video-section">
        <div class="video-player">
            <iframe src="https://www.youtube.com/embed/rjyjcUOHLiA?si=Cfy3AhVwNnzoMipz" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>

        <h2>Meu Vídeo</h2>

        <div class="video-info">
            <div class="channel">
                <img src="https://via.placeholder.com/40">
                <div>
                    <p><strong>Luan Pires</strong></p>
                    <span>536 mil inscritos</span>
                </div>
            </div>

            <div class="actions">
                <button>👍 870</button>
                <button>Compartilhar</button>
                <button>Salvar</button>
            </div>

        </div>
    </section>

    <!-- Sidebar -->
    <sidebar class="sidebar">
        <div class="card">
            <div class="thumb">
              <img src="Video (5).png" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video (3).png" alt="">
            </div>
            
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video.jpg" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
              <img src="Video (4).png" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video (5).png" alt="">
            </div>
            
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video.jpg" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
              <img src="Video (4).png" alt="">
            </div>
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video (5).png" alt="">
            </div>
            
        </div>
        <div class="card">
            <div class="thumb">
             <img src="Video.jpg" alt="">
            </div>
        </div>

    </sidebar>

</main>

</body>
</html>
