<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato</title>
  <link rel="stylesheet" href="styleatividade.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
  <div class="logo">LOGO</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Serviços</a>
    <a href="#">Contato</a>
  </nav>
</header>

<main class="container">
  <h2>Contato</h2>

  <div class="content">
    
    <!-- FORMULÁRIO -->
    <form class="form">
      <label>Nome</label>
      <input type="text" placeholder="Seu nome">

      <label>Telefone</label>
      <input type="tel" placeholder="(00) 00000-0000">

      <label>E-mail</label>
      <input type="email" placeholder="seu@email.com">

      <label>Mensagem</label>
      <textarea rows="5" placeholder="Digite sua mensagem"></textarea>
      <p>Como prefere o nosso contato?</p>
      <fieldset>
      <article class="radio-group">
        <label><input type="radio" name="contato"> E-mail</label>
        <label><input type="radio" name="contato"> Telefone</label>
        <label><input type="radio" name="contato"> WhatsApp</label>
      </article>
      </fieldset>

      <label>Qual horário prefere ser atendido?</label>
      <select>
        <option>Manhã</option>
        <option>Tarde</option>
        <option>Noite</option>
      </select>

      <button type="submit">Enviar</button>
    </form>

    <!-- INFORMAÇÕES -->
    <section class="info">
      <article class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d17429.30281509951!2d-51.16616698946133!3d-23.31359755334935!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94eb435d5b264775%3A0xfd3a2c2dc9f2232f!2sSenac%20Londrina!5e0!3m2!1spt-BR!2sbr!4v1776968264271!5m2!1spt-BR!2sbr"  style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </article>

      <p>
        Rua Raposo Tavares, 894<br> 
        Centro, CEP 86010-580<br>
        Londrina - PR,
    
      </p>

      <div class="contact-icons">
        <span>✉ contato@senac.com</span>
        <span>📷 @senac</span>
        <span>📞 xx-xxxxx-xxxx</span>
        <span>🌐 www.senac.com</span>
      </div>
    </section>

  </div>
</main>

<footer>
  senac@2024 - Todos os direitos reservados
</footer>

</body>
</html>
