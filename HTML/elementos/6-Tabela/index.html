HTML

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabela</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table>
      <!-- Para criar uma linha <tr> -->
      <tr>
        <th>Nome</th>
        <th>Idade</th>
        <th colspan="3">Endereço</th>
      </tr>
      <tr>
        <!-- Para criar colunas <td> -->
        <td>João</td>
        <td>15</td>

        <td>Rua xxxx</td>
        <td>nº 20</td>
        <td>Bairro Centro</td>
      </tr>
      <tr>
        <td>Marcos</td>
        <td>20</td>
        <td>
          <button><img src="user.png" alt="icon usuário" /> Usuário</button>
        </td>
        <td></td>
        <td></td>
      </tr>
      <tr>
        <td>Charles</td>
        <td>18</td>
      </tr>
    </table>
  </body>
</html>
