<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tipos de css</title>
  <style>
    p {
      color: blue;
      font-size: 18px;
    }
    .p {
      color: red;
      font-size: 20px;
      font-family: 'Arial', Times, serif;
    }
  </style>
</head>
<body>
  <h1 style="color: brown;">Titulo com formatação</h1>

  <p>Paragrafo 1 com formatação</p>
  <p class="p">Paragrafo 2 com formatação</p>
</body>
</html>
